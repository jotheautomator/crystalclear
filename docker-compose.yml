version: "3.9"

services:
  # ──────────────────────────────────────────────
  # PostgreSQL — structured data
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: crystalclear-postgres
    environment:
      POSTGRES_DB: crystalclear
      POSTGRES_USER: crystalclear
      POSTGRES_PASSWORD: crystalclear_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crystalclear"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # Neo4j — graph data
  # ──────────────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    container_name: crystalclear-neo4j
    environment:
      NEO4J_AUTH: neo4j/crystalclear_dev
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p crystalclear_dev 'RETURN 1'"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ──────────────────────────────────────────────
  # Backend — FastAPI
  # ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crystalclear-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://crystalclear:crystalclear_dev@postgres:5432/crystalclear
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: crystalclear_dev
      JWT_SECRET: dev-secret-change-in-production
      JWT_ALGORITHM: HS256
      JWT_EXPIRATION_MINUTES: 60
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ──────────────────────────────────────────────
  # Frontend — React + Vite
  # ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crystalclear-frontend
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
  neo4j_data:
